name: Build EXE for Windows

on:
  push:
    branches: [ "main" ]  # 当代码推送到 main 分支时触发
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:      # 允许手动触发构建

jobs:
  build:
    runs-on: windows-latest  # 必须在 Windows 环境下运行才能打包出 .exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9' # 你可以根据需要更改 Python 版本

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # 如果你有 requirements.txt，取消下面一行的注释
        # pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        # --onefile 表示打包成单个 exe
        # --windowed 如果是 GUI 程序请加这个参数，否则运行时会弹出黑窗口
        pyinstaller --onefile hello.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hello-windows-exe
        path: dist/hello.exe  # PyInstaller 默认输出在 dist 文件夹
